name: Release

on:
  workflow_dispatch:
    inputs:
      tags: 
        required: true
        type: string
        description: Example - v2.4.1
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
jobs:    
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '10.0.x']
    steps:
    - name: Checkout
      uses: actions/checkout@v4
  
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
  
    - name: Restore dependencies
      run: dotnet restore
  
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Test with TUnit (.NET ${{ matrix.dotnet-version }})
      run: dotnet run --project TelnetNegotiationCore.UnitTests --configuration Release --no-build --framework net${{ matrix.dotnet-version == '8.0.x' && '8.0' || '10.0' }}
  
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
    - name: Checkout
      uses: actions/checkout@v4
 
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    
    - name: Restore dependencies
      run: dotnet restore
   
    - name: Verify commit exists in origin/main
      run: |
        git fetch --no-tags --prune --depth=1 origin +refs/heads/*:refs/remotes/origin/*
        git branch --remote --contains | grep origin/main
   
    - name: Set VERSION variable
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG="${{ inputs.tags }}"
        else
          TAG="${GITHUB_REF#refs/tags/}"
        fi
        echo "VERSION=${TAG#v}" >> $GITHUB_ENV
   
    - name: Build
      run: dotnet build --configuration Release /p:Version=${VERSION} --no-restore

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: "**/*.nupkg"

  release:
    permissions:
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Push to GitHub Packages
      run: dotnet nuget push "**/*.nupkg" --skip-duplicate --source https://nuget.pkg.github.com/HarryCordewener/index.json --api-key ${GITHUB_TOKEN}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: NuGet Login
      uses: NuGet/login@v1
      id: login
      with:
        user: harrycordewener
        
    - name: Push to NuGet
      run: dotnet nuget push "**/*.nupkg" --skip-duplicate --source https://api.nuget.org/v3/index.json -k ${{steps.login.outputs.NUGET_API_KEY}}
